apiVersion: apps/v1
kind: Deployment
metadata:
  name: cryo-app-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cryo-app
  template:
    metadata:
      labels:
        app: cryo-app
    spec:
      containers:
      - name: cryo-app-container
        image: mlgouthamreddy/cryo-app:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8501
---
apiVersion: v1
kind: Service
metadata:
  name: cryo-app-service
spec:
  type: NodePort
  selector:
    app: cryo-app
  ports:
    - port: 8501
      targetPort: 8501
      nodePort: 30001